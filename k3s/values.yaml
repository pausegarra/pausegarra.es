appName: "personal-site"
listeningPort: 80

image:
  repository: "psegarra/pausegarra"

imagePullSecrets:
  enabled: false

resources:
  limits:
    cpu: 100m
    memory: 100Mi
  requests:
    cpu: 100m
    memory: 100Mi

livenessProbe:
  path: /

rollingUpdate:
  enabled: true

ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: "pausegarra.es"
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - pausegarra.es
      secretName: pausegarra-tls